site_name: Sécurité des infrastructures logicielles et matérielles
theme:
  name: material
  palette:
    primary: red
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true
  - attr_list
  - md_in_html
  - pymdownx.blocks.caption

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Accueil: index.md
  - Cours:
      - Séance-01: cours/01.md
      - Séance-02: cours/02.md
      - Séance-03: cours/03.md
      - Séance-04: cours/04.md
  - QCM: quizz.md
  - Travaux Pratiques:
      - TP-01: tp/tp01.md
      - TP-02: tp/tp02.md
      - TP-03: tp/tp03.md
      - TP-04: tp/tp04.md
